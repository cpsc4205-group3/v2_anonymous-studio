services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped

  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.8.1
    restart: unless-stopped
    depends_on:
      - redis
    environment:
      OAUTH2_PROXY_PROVIDER: oidc
      OAUTH2_PROXY_OIDC_ISSUER_URL: https://${AUTH0_DOMAIN}/
      OAUTH2_PROXY_CLIENT_ID: ${AUTH0_CLIENT_ID}
      OAUTH2_PROXY_CLIENT_SECRET: ${AUTH0_CLIENT_SECRET}
      OAUTH2_PROXY_REDIRECT_URL: ${AUTH_PROXY_REDIRECT_URL}
      OAUTH2_PROXY_SCOPE: openid profile email
      OAUTH2_PROXY_EMAIL_DOMAINS: "*"
      OAUTH2_PROXY_UPSTREAMS: static://200
      OAUTH2_PROXY_HTTP_ADDRESS: 0.0.0.0:4180
      OAUTH2_PROXY_REVERSE_PROXY: "true"
      OAUTH2_PROXY_SET_XAUTHREQUEST: "true"
      OAUTH2_PROXY_PASS_ACCESS_TOKEN: "true"
      OAUTH2_PROXY_COOKIE_SECRET: ${OAUTH2_PROXY_COOKIE_SECRET}
      OAUTH2_PROXY_COOKIE_NAME: _anon_studio_auth
      OAUTH2_PROXY_COOKIE_SECURE: ${AUTH_PROXY_COOKIE_SECURE:-false}
      OAUTH2_PROXY_COOKIE_SAMESITE: lax
      OAUTH2_PROXY_SKIP_PROVIDER_BUTTON: "true"
      OAUTH2_PROXY_CODE_CHALLENGE_METHOD: S256
      OAUTH2_PROXY_SESSION_STORE_TYPE: redis
      OAUTH2_PROXY_REDIS_CONNECTION_URL: redis://redis:6379

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - oauth2-proxy
    ports:
      - "${AUTH_PROXY_PORT:-8080}:8080"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
